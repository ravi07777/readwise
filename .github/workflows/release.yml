name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test --test-randomize-ordering-seed random

      - name: Build Release APK
        run: flutter build apk --release --target-platform android-arm,android-arm64

      - name: Build Release App Bundle
        run: flutter build appbundle --release

      - name: Sign APK
        env:
          SIGNING_KEY_STORE: ${{ secrets.SIGNING_KEY_STORE }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          echo "$SIGNING_KEY_STORE" | base64 --decode > /tmp/keystore.jks
          cp android/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml.bak
          # Signing configuration is in build.gradle

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: ReadWise AI Assistant ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload Release APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-release.apk
          asset_name: readwise-ai-${{ github.ref_name }}.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload Release App Bundle
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/bundle/release/app-release.aab
          asset_name: readwise-ai-${{ github.ref_name }}.aab
          asset_content_type: application/octet-stream

  deploy_play_store:
    name: Deploy to Play Store
    runs-on: ubuntu-latest
    needs: release
    if: false # Enable when Play Store credentials are configured

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release App Bundle
        run: flutter build appbundle --release

      - name: Deploy to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.readwise.ai
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          inAppUpdatePriority: 2
