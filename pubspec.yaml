name: readwise_ai_assistant
description: AI-powered reading assistant overlay for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Data Classes
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Networking
  dio: ^5.4.3+1

  # AI SDKs
  openai_dart: ^1.4.0
  google_generative_ai: ^0.4.3
  anthropic_sdk_dart: ^0.2.0

  # UI
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1

  # Utilities
  flutter_local_notifications: ^17.2.1+2
  flutter_native_splash: ^2.4.0
  permission_handler: ^11.3.1
  clipboard: ^0.1.3
  share_plus: ^9.0.0
  url_launcher: ^6.2.6
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0
  equatable: ^2.0.5
  provider: ^6.1.2

  # Platform
  window_manager: ^0.3.9
  wakelock_plus: ^1.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  mocktail: ^1.0.3
  bloc_test: ^9.1.7
  network_image_mock: ^2.1.1
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
